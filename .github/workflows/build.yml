name: Build Node.js App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Passo 1: Baixa o código no servidor do GitHub
    - name: Checkout do código
      uses: actions/checkout@v4

    # Passo 2: Configura o Node.js na máquina virtual
    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Ou a versão que você estiver usando

    # Passo 3: Instala o Jest e outras dependências
    - name: Instalar dependências
      run: npm ci

    # Passo 4: O comando do seu PASSO 11.4
    - name: Rodar Testes Unitários
      run: npm test
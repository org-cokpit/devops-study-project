name: Build Node.js App
 
on:
  push:
    branches:
      - main
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
 
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
 
      - name: Instalar dependências
        run: npm install
 
      - name: Executar aplicação
        run: node app.js